<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri 2026</title>
    <style>
        /* --- CSS STYLING --- */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a472a 0%, #0d2b18 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Amiri', serif;
            overflow: hidden;
            color: #fff;
        }

        /* Container Kartu */
        .card-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid #d4af37; /* Warna Emas */
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
        }

        /* Dekorasi Pola Islami Sederhana */
        .pattern {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .year {
            font-size: 1.2rem;
            color: #a8e6cf;
            margin-bottom: 30px;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding: 5px 20px;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        button {
            background: linear-gradient(45deg, #d4af37, #f9e076);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            color: #0d2b18;
            font-family: 'Amiri', serif;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }

        /* Animasi Melayang */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Canvas untuk Kembang Api */
        #fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>

    <div class="card-container">
        <div class="pattern"></div>
        <h1>Taqabbalallahu Minna Wa Minkum</h1>
        <div class="year">1447 H / 2026 M</div>
        
        <h2>Selamat Hari Raya Idul Fitri</h2>
        
        <p class="message">
            Semoga di tahun 2026 ini, kita kembali fitrah,<br>
            suci dalam hati, dan bersaudara dalam kebahagiaan.<br>
            <br>
            <br>Saya Azka</br>
            <strong>Mohon Maaf Lahir dan Batin</strong>
        </p>

        <button onclick="startCelebration()">Ucapkan Doa</button>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        // Mengatur ukuran canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Kelas Partikel untuk Kembang Api
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                // Kecepatan acak
                const velocity = Math.random() * 4 + 2;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01; // Kecepatan menghilang
                this.gravity = 0.05;
            }

            update() {
                this.vx *= 0.95; // Gesekan udara
                this.vy *= 0.95;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Fungsi Membuat Ledakan
        function createExplosion(x, y) {
            const colors = ['#FFD700', '#FFFFFF', '#00FF00', '#FF4500', '#d4af37'];
            for (let i = 0; i < 50; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        // Loop Animasi
        function animate() {
            requestAnimationFrame(animate);
            // Efek jejak (trail)
            ctx.fillStyle = 'rgba(13, 43, 24, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });
        }

        // Jalankan animasi
        animate();

        // Fungsi Tombol
        function startCelebration() {
            // Ledakan di tengah
            createExplosion(window.innerWidth / 2, window.innerHeight / 2);
            
            // Ledakan acak di sekitar layar
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight;
                    createExplosion(x, y);
                }, i * 300);
            }

            // Ubah teks tombol
            const btn = document.querySelector('button');
            btn.innerHTML = "Aamiin Yaa Rabbal Alamin";
            btn.style.background = "linear-gradient(45deg, #fff, #eee)";
            
            // Play Audio (Opsional - Browser memblokir autoplay, jadi harus diklik dulu)
            // Jika Anda punya file mp3, tambahkan baris ini:
            // new Audio('path_to_audio.mp3').play();
        }

        // Efek kembang api otomatis saat halaman dimuat (kecil saja)
        setInterval(() => {
            if(Math.random() > 0.7) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight / 2);
                createExplosion(x, y);
            }
        }, 800);

    </script>
</body>
</html>
