<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri 2026 - Taqabbalallahu Minna Wa Minkum</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Cinzel:wght@400;600&display=swap');

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9e076;
            --gold-dark: #b8941f;
            --green-deep: #0a1f12;
            --green-medium: #1a472a;
            --green-light: #2d6b3f;
            --white-glow: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, var(--green-medium) 0%, var(--green-deep) 50%, #05140a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Amiri', serif;
            overflow: hidden;
            color: #fff;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        .moon {
            position: absolute;
            top: 5%;
            right: 10%;
            width: 80px;
            height: 80px;
            animation: moonGlow 3s ease-in-out infinite;
        }

        .moon::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 25px 10px 0 0 var(--gold-primary);
            transform: rotate(-15deg);
        }

        @keyframes moonGlow {
            0%, 100% { filter: drop-shadow(0 0 20px var(--gold-primary)); }
            50% { filter: drop-shadow(0 0 40px var(--gold-light)); }
        }

        .card-container {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 3px solid var(--gold-primary);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 
                0 0 60px rgba(212, 175, 55, 0.4),
                inset 0 0 60px rgba(212, 175, 55, 0.1),
                0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            z-index: 10;
            animation: float 4s ease-in-out infinite, cardEntrance 1s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 0 80px rgba(212, 175, 55, 0.6),
                inset 0 0 80px rgba(212, 175, 55, 0.15),
                0 30px 60px rgba(0, 0, 0, 0.4);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid var(--gold-primary);
            opacity: 0.6;
        }

        .corner-tl {
            top: 15px;
            left: 15px;
            border-right: none;
            border-bottom: none;
            border-radius: 10px 0 0 0;
        }

        .corner-tr {
            top: 15px;
            right: 15px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 10px 0 0;
        }

        .corner-bl {
            bottom: 15px;
            left: 15px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 10px;
        }

        .corner-br {
            bottom: 15px;
            right: 15px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 10px 0;
        }

        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            opacity: 0.3;
            border-radius: 30px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-primary) 50%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            animation: textShimmer 3s ease-in-out infinite;
            line-height: 1.2;
        }

        @keyframes textShimmer {
            0%, 100% { filter: drop-shadow(0 2px 4px rgba(212, 175, 55, 0.3)); }
            50% { filter: drop-shadow(0 2px 8px rgba(212, 175, 55, 0.6)); }
        }

        h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 600;
            color: var(--white-glow);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .year {
            font-size: 1.4rem;
            color: var(--gold-light);
            margin-bottom: 35px;
            letter-spacing: 4px;
            border-top: 2px solid rgba(212, 175, 55, 0.5);
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
            display: inline-block;
            padding: 10px 30px;
            background: rgba(212, 175, 55, 0.1);
            border-radius: 5px;
            font-family: 'Cinzel', serif;
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 35px;
            opacity: 0.95;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
        }

        .message strong {
            color: var(--gold-light);
            font-size: 1.3rem;
            display: block;
            margin-top: 15px;
            font-style: normal;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: var(--gold-primary);
            margin: 10px 0;
        }

        button {
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-light) 50%, var(--gold-primary) 100%);
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            color: var(--green-deep);
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 25px rgba(212, 175, 55, 0.4),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(212, 175, 55, 0.6),
                inset 0 2px 5px rgba(255, 255, 255, 0.4);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .lantern {
            position: absolute;
            width: 30px;
            height: 40px;
            background: linear-gradient(180deg, var(--gold-light), var(--gold-primary));
            border-radius: 5px 5px 15px 15px;
            animation: floatUp 8s linear infinite;
            opacity: 0.6;
            box-shadow: 0 0 20px var(--gold-primary);
        }

        .lantern::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: var(--gold-dark);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(10deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .card-container {
                padding: 40px 25px;
                width: 95%;
            }

            h1 {
                font-size: 2.8rem;
            }

            h2 {
                font-size: 1.4rem;
            }

            .year {
                font-size: 1.1rem;
                padding: 8px 20px;
            }

            .message {
                font-size: 1rem;
            }

            button {
                padding: 12px 35px;
                font-size: 1rem;
            }

            .moon {
                width: 50px;
                height: 50px;
                top: 3%;
                right: 5%;
            }

            .moon::before {
                width: 40px;
                height: 40px;
                box-shadow: 18px 5px 0 0 var(--gold-primary);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }

            h2 {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .corner {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>
    
    <div class="stars" id="stars"></div>
    
    <div class="moon"></div>
    
    <div id="lanterns"></div>

    <div class="card-container">
        <div class="pattern-overlay"></div>
        
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <h1>Taqabbalallahu Minna Wa Minkum</h1>
        <div class="year">1447 H / 2026 M</div>
        
        <h2>Selamat Hari Raya Idul Fitri</h2>
        
        <p class="message">
            Semoga di tahun 2026 ini, kita kembali fitrah,<br>
            suci dalam hati, dan bersaudara dalam kebahagiaan.<br>
            Keberkahan dan kedamaian menyertai kita semua.
        </p>
        
        <div class="signature">Azka</div>
        
        <p class="message">
            <strong>Mohon Maaf Lahir dan Batin</strong>
        </p>

        <button onclick="startCelebration()">Ucapkan Doa</button>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        function createLanterns() {
            const lanternsContainer = document.getElementById('lanterns');
            const lanternCount = 8;
            
            for (let i = 0; i < lanternCount; i++) {
                setTimeout(() => {
                    const lantern = document.createElement('div');
                    lantern.className = 'lantern';
                    lantern.style.left = Math.random() * 100 + '%';
                    lantern.style.animationDelay = Math.random() * 5 + 's';
                    lantern.style.animationDuration = (Math.random() * 5 + 6) + 's';
                    lanternsContainer.appendChild(lantern);
                    
                    setTimeout(() => {
                        lantern.remove();
                        createLantern(lanternsContainer);
                    }, 13000);
                }, i * 800);
            }
        }

        function createLantern(container) {
            const lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.style.left = Math.random() * 100 + '%';
            lantern.style.animationDelay = '0s';
            lantern.style.animationDuration = (Math.random() * 5 + 6) + 's';
            container.appendChild(lantern);
            
            setTimeout(() => {
                lantern.remove();
                createLantern(container);
            }, 13000);
        }

        class Particle {
            constructor(x, y, color, type = 'normal') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                
                if (type === 'sparkle') {
                    const velocity = Math.random() * 6 + 3;
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * velocity;
                    this.vy = Math.sin(angle) * velocity;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.02 + 0.015;
                    this.gravity = 0.03;
                    this.size = Math.random() * 4 + 2;
                } else {
                    const velocity = Math.random() * 5 + 2;
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * velocity;
                    this.vy = Math.sin(angle) * velocity;
                    this.alpha = 1;
                    this.decay = Math.random() * 0.015 + 0.01;
                    this.gravity = 0.05;
                    this.size = Math.random() * 3 + 1.5;
                }
            }

            update() {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                
                if (this.type === 'sparkle') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, pattern = 'circle') {
            const colors = [
                '#FFD700', '#FFFFFF', '#00FF00', '#FF4500', '#d4af37',
                '#FF6B6B', '#4ECDC4', '#A8E6CF', '#FFEAA7', '#74B9FF'
            ];
            
            const particleCount = pattern === 'big' ? 100 : 60;
            
            for (let i = 0; i < particleCount; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                if (pattern === 'ring') {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const velocity = 4;
                    const p = new Particle(x, y, color);
                    p.vx = Math.cos(angle) * velocity;
                    p.vy = Math.sin(angle) * velocity;
                    particles.push(p);
                } else {
                    particles.push(new Particle(x, y, color));
                }
            }
            
            for (let i = 0; i < 20; i++) {
                const sparkle = new Particle(x, y, '#FFFFFF', 'sparkle');
                particles.push(sparkle);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(10, 31, 18, 0.15)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });
        }

        animate();

        function startCelebration() {
            createExplosion(window.innerWidth / 2, window.innerHeight / 2, 'big');
            
            setTimeout(() => {
                createExplosion(window.innerWidth / 2 - 150, window.innerHeight / 2 - 100, 'ring');
                createExplosion(window.innerWidth / 2 + 150, window.innerHeight / 2 - 100, 'ring');
            }, 200);
            
            setTimeout(() => {
                createExplosion(window.innerWidth / 2 - 150, window.innerHeight / 2 + 100, 'ring');
                createExplosion(window.innerWidth / 2 + 150, window.innerHeight / 2 + 100, 'ring');
            }, 400);
            
            for(let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * (window.innerHeight * 0.7);
                    createExplosion(x, y);
                }, i * 150);
            }

            const btn = document.querySelector('button');
            btn.innerHTML = "Aamiin Yaa Rabbal Alamin";
            btn.style.background = "linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #fff 100%)";
            btn.style.color = "#0a1f12";
            btn.style.animation = "buttonPulse 0.5s ease-in-out";
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes buttonPulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.1); }
            }
        `;
        document.head.appendChild(style);

        let autoFireworkCount = 0;
        const autoFireworkInterval = setInterval(() => {
            if(autoFireworkCount < 5) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight * 0.5);
                createExplosion(x, y);
                autoFireworkCount++;
            } else {
                clearInterval(autoFireworkInterval);
            }
        }, 600);

        setInterval(() => {
            if(Math.random() > 0.6) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * (window.innerHeight * 0.4);
                createExplosion(x, y);
            }
        }, 1200);

        window.addEventListener('load', () => {
            createStars();
            createLanterns();
            
            setTimeout(() => {
                createExplosion(window.innerWidth / 2, window.innerHeight / 3, 'big');
            }, 500);
        });

    </script>
</body>
</html>
